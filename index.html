<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#00A86B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Piyush's Transformation Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>💪</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --border:#EAECF0;
  --accent:#00A86B;
  --accent-lt:#E6F7F1;
  --accent-dk:#007A4E;
  --orange:#F59E0B;
  --orange-lt:#FFFBEB;
  --red:#EF4444;
  --red-lt:#FEF2F2;
  --blue:#3B82F6;
  --blue-lt:#EFF6FF;
  --text:#1A1A1A;
  --text2:#444;
  --muted:#666;
  --muted2:#999;
  --card-shadow:0 1px 4px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
.app{padding-bottom:80px;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);box-shadow:0 -1px 0 var(--border),0 -4px 16px rgba(0,0,0,0.06);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;min-height:56px;}
.bnav-icon{font-size:20px;line-height:1;transition:transform .15s;}
.bnav-btn.active .bnav-icon{transform:scale(1.15);}
.bnav-label{font-size:10px;font-weight:600;color:var(--muted2);letter-spacing:.02em;transition:color .15s;}
.bnav-btn.active .bnav-label{color:var(--accent);}

/* CONTENT */
.content{padding:12px 16px;}

/* CARDS */
.card{background:var(--surface);border-radius:18px;padding:18px;box-shadow:var(--card-shadow);margin-bottom:14px;}
.card-sm{background:var(--surface);border-radius:14px;padding:14px;box-shadow:var(--card-shadow);margin-bottom:10px;}
.card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.card-sub{font-size:13px;color:var(--muted);}

/* SECTION LABELS */
.sec-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:20px 0 8px;padding:0 2px;}

/* BUTTONS */
.btn{padding:13px 20px;border-radius:14px;border:none;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit;transition:all .15s;min-height:44px;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:active{background:var(--accent-dk);transform:scale(0.98);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text2);}
.btn-outline:active{background:var(--bg);}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:10px;min-height:36px;}
.btn-ghost{background:transparent;border:none;color:var(--muted);font-size:13px;font-weight:500;min-height:44px;cursor:pointer;font-family:inherit;}
.btn-block{width:100%;}
.btn-red{background:var(--red-lt);color:var(--red);border:none;}

/* INPUTS */
input,select{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--text);padding:12px 14px;font-size:15px;font-family:inherit;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,select:focus{border-color:var(--accent);}
label{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}

/* PILLS */
.tag-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.tag-push{background:var(--red-lt);color:var(--red);}
.tag-pull{background:var(--accent-lt);color:var(--accent-dk);}
.tag-cardio{background:var(--blue-lt);color:var(--blue);}
.tag-legs{background:var(--orange-lt);color:var(--orange);}
.tag-arms{background:#F5F3FF;color:#6D28D9;}
.tag-full{background:#E0F2FE;color:#0369A1;}
.tag-rest{background:var(--orange-lt);color:#92400E;}

/* DAY PILLS */
.day-pills{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
.day-pills::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;padding:6px 0;border-radius:14px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);min-height:32px;width:calc((100% - 42px)/7);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.day-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.day-pill.today-hl{border-color:var(--accent);color:var(--accent);}

/* PROGRESS BAR */
.pb-wrap{background:var(--border);border-radius:100px;height:8px;overflow:hidden;}
.pb{height:100%;border-radius:100px;transition:width .4s ease;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border-radius:16px;padding:14px 10px;text-align:center;box-shadow:var(--card-shadow);}
.stat-val{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:2px;}
.stat-label{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.07em;}

/* EXERCISE CARDS */
.ex-card{background:var(--surface);border-radius:16px;margin-bottom:10px;box-shadow:var(--card-shadow);overflow:hidden;}
.ex-hdr{width:100%;background:none;border:none;cursor:pointer;padding:14px;text-align:left;display:flex;align-items:center;gap:12px;min-height:64px;font-family:inherit;}
.ex-check{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;user-select:none;}
.ex-check.done{background:var(--accent);border-color:var(--accent);}
.ex-check.done::after{content:'✓';color:#fff;font-size:13px;font-weight:700;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.ex-muscle{font-size:12px;color:var(--muted);}
.ex-badge{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.sets-badge{background:var(--accent-lt);color:var(--accent-dk);font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;white-space:nowrap;}
.sw-badge{font-size:10px;color:var(--muted);font-weight:500;}
.ex-body{padding:0 14px 14px;}
.ex-img{width:100%;height:160px;object-fit:cover;border-radius:12px;margin-bottom:12px;}
.ex-how{font-size:13px;color:var(--text2);line-height:1.65;background:var(--bg);border-radius:12px;padding:12px;margin-bottom:10px;}

/* MUSCLE LEGEND */
.muscle-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.ml-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--muted);}
.ml-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}

/* WARMUP / COOLDOWN */
.wu-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.wu-item:last-child{border-bottom:none;}
.wu-icon{display:flex;flex-shrink:0;align-items:center;margin-top:1px;}
.wu-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.wu-detail{font-size:12.5px;color:var(--muted);line-height:1.55;}

/* COLLAPSIBLE SECTION */
.section-toggle{width:100%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;font-family:inherit;}
.section-toggle-label{font-size:14px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.chevron{font-size:14px;color:var(--muted);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}

/* CARDIO CARD */
.cardio-card{background:var(--blue-lt);border-radius:14px;padding:14px 16px;display:flex;gap:14px;align-items:flex-start;}
.cardio-type{font-size:14px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.cardio-meta{font-size:12px;color:var(--text2);margin-bottom:6px;}
.cardio-tip{font-size:12px;color:var(--muted);line-height:1.5;}

/* CORE ITEMS */
.core-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.core-item:last-child{border-bottom:none;}
.core-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
.core-meta{font-size:12px;color:var(--muted);margin-bottom:4px;}
.core-tip{font-size:12.5px;color:var(--text2);line-height:1.55;}

/* MEALS */
.meal-card{background:var(--surface);border-radius:16px;margin-bottom:8px;box-shadow:var(--card-shadow);overflow:hidden;}
.meal-hdr{width:100%;background:none;border:none;cursor:pointer;padding:13px 14px;text-align:left;display:flex;align-items:center;gap:12px;min-height:60px;font-family:inherit;}
.meal-time{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;min-width:52px;}
.meal-name{font-size:13.5px;font-weight:700;color:var(--text);flex:1;}
.meal-body{padding:0 14px 14px;}
.meal-detail{font-size:13px;color:var(--text2);line-height:1.6;background:var(--bg);border-radius:12px;padding:12px;margin-bottom:8px;}
.macro-pills{display:flex;gap:5px;flex-wrap:wrap;}
.mpill{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;}
.mpill-p{background:var(--accent-lt);color:var(--accent-dk);}
.mpill-c{background:var(--blue-lt);color:var(--blue);}
.mpill-f{background:var(--orange-lt);color:#92400E;}
.mpill-k{background:#F5F3FF;color:#6D28D9;}

/* WEIGHT LOG */
.wlog-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.wlog-row:last-child{border-bottom:none;}
.wlog-date{font-size:13px;color:var(--muted);}
.wlog-wt{font-size:18px;font-weight:800;color:var(--text);}
.wlog-delta{font-size:12px;font-weight:700;}

/* PHOTO */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.photo-cell{aspect-ratio:3/4;border-radius:12px;overflow:hidden;cursor:pointer;position:relative;background:var(--bg);}
.photo-cell img{width:100%;height:100%;object-fit:cover;}
.photo-lbl{position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:10px;color:#fff;background:rgba(0,0,0,.5);padding:4px;}
.photo-add{aspect-ratio:3/4;border-radius:12px;border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:var(--bg);font-size:12px;color:var(--muted);font-weight:600;}

/* MEASUREMENTS */
.meas-grid{display:grid;grid-template-columns:1fr;gap:10px;min-width:0;}
.meas-field{display:flex;flex-direction:column;gap:6px;min-width:0;}
.meas-field input{width:100%;box-sizing:border-box;min-width:0;}

/* SUPPLEMENT ROW */
.supp-row{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.supp-row:last-child{border-bottom:none;}
.supp-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--bg);}
.supp-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1px;}
.supp-dose{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:3px;}
.supp-time{font-size:11px;color:var(--muted);}
.supp-tip{font-size:12px;color:var(--text2);line-height:1.5;margin-top:3px;}

/* CHECKLIST */
.checklist-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;min-height:44px;}
.checklist-row:last-child{border-bottom:none;}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk.done{background:var(--accent);border-color:var(--accent);}
.chk.done::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.chk.skipped{background:#F3F4F6;border-color:#D1D5DB;}
.chk.skipped::after{content:'—';color:#9CA3AF;font-size:13px;font-weight:800;}

/* ALERTS */
.alert{border-radius:14px;padding:13px 15px;font-size:13px;line-height:1.6;margin-bottom:12px;}
.alert strong{font-weight:700;}
.alert-orange{background:var(--orange-lt);color:#92400E;}
.alert-green{background:var(--accent-lt);color:var(--accent-dk);}
.alert-red{background:var(--red-lt);color:#991B1B;}
.alert-blue{background:var(--blue-lt);color:#1E40AF;}

/* PHASE TABS */
.phase-tabs{display:flex;gap:6px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch;touch-action:pan-x;}
.phase-tabs::-webkit-scrollbar{display:none;}
.phase-tab{flex-shrink:0;padding:5px 0;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;min-height:30px;width:calc((100% - 24px)/5);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.phase-tab.active{background:var(--accent-lt);border-color:var(--accent);color:var(--accent-dk);}

/* IBS BANNER */
.ibs-banner{background:var(--orange-lt);border-radius:14px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
.ibs-text{font-size:12.5px;color:#92400E;line-height:1.5;}

/* COACH NOTES */
.coach-note{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.coach-note:last-child{border-bottom:none;}
.coach-note-bar{width:3px;border-radius:3px;align-self:stretch;flex-shrink:0;}
.coach-note-msg{font-size:13px;color:var(--text2);line-height:1.55;}

/* TODAY MISSION */
.mission-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mission-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:12px;background:var(--bg);font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:1.5px solid transparent;transition:all .15s;}
.mission-item.done{background:var(--accent-lt);color:var(--accent-dk);border-color:var(--accent);}
.mission-item.skipped{background:#F3F4F6;color:#9CA3AF;border-color:#E5E7EB;}

/* HYDRATION CUPS */
.water-cups{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.water-cup{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:var(--surface);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.water-cup.filled{background:var(--blue-lt);border-color:var(--blue);}

/* PHASE OVERVIEW */
.phase-ov{background:var(--surface);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:var(--card-shadow);}
.phase-ov-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.phase-ov-name{font-size:15px;font-weight:800;color:var(--text);}
.phase-ov-wk{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.phase-ov-desc{font-size:13px;color:var(--muted);line-height:1.55;}

/* STRENGTH TARGETS */
.strength-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.strength-row:last-child{border-bottom:none;}
.strength-name{font-size:13px;font-weight:600;color:var(--text);}
.st-chip{font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--bg);color:var(--muted);}
.st-chip.current{background:var(--accent-lt);color:var(--accent-dk);}

/* ACHIEVEMENT CARDS */
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ach-card{background:var(--surface);border-radius:14px;padding:14px;box-shadow:var(--card-shadow);display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;transition:all .15s;}
.ach-card.locked{opacity:.45;filter:grayscale(1);}
.ach-icon{font-size:28px;}
.ach-title{font-size:12px;font-weight:700;color:var(--text);}
.ach-desc{font-size:11px;color:var(--muted);line-height:1.4;}

/* CALENDAR */
.cal-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;}
.cal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 16px 40px;width:100%;max-width:430px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.cal-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cal-title{font-size:17px;font-weight:800;color:var(--text);}
.cal-nav{background:var(--bg);border:none;border-radius:10px;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dh{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:6px 0;text-transform:uppercase;letter-spacing:.06em;}
.cal-d{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:1.5px solid transparent;transition:all .15s;}
.cal-d.today{background:var(--accent-lt);color:var(--accent);font-weight:700;border-color:var(--accent);}
.cal-d.selected{background:var(--accent);color:#fff;font-weight:700;}
.cal-d.empty,.cal-d.future{opacity:.3;cursor:default;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-body{background:var(--surface);border-radius:20px;padding:20px;width:100%;max-width:390px;max-height:80vh;overflow-y:auto;}
.modal-img{width:100%;max-height:70vh;object-fit:contain;border-radius:12px;}

/* GYM MODE */
.gym-overlay{position:fixed;inset:0;background:#0A0A0A;z-index:500;display:flex;flex-direction:column;overflow-y:auto;}
.gym-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.gym-close{background:rgba(255,255,255,.1);border:none;border-radius:12px;width:40px;height:40px;font-size:18px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.gym-progress-bar{height:3px;background:rgba(255,255,255,.1);margin:0 20px 20px;}
.gym-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .35s;}
.gym-body{flex:1;padding:0 20px 30px;}
.gym-ex-num{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.gym-ex-name{font-size:26px;font-weight:800;color:#fff;margin-bottom:4px;line-height:1.2;}
.gym-ex-muscle{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:20px;}
.gym-prev{background:rgba(255,255,255,.06);border-radius:14px;padding:12px 16px;margin-bottom:20px;}
.gym-prev-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.gym-prev-val{font-size:14px;color:rgba(255,255,255,.8);}
.gym-set-label{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.gym-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.gym-input-wrap{display:flex;flex-direction:column;gap:6px;}
.gym-input-lbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:.08em;text-transform:uppercase;}

.gym-input:focus{border-color:var(--accent);}

.gym-btn-complete:active{transform:scale(0.98);}
.gym-btn-skip{width:100%;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:none;border-radius:14px;padding:12px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.gym-rest-overlay{position:absolute;inset:0;background:#0A0A0A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.gym-rest-label{font-size:13px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.1em;text-transform:uppercase;}
.gym-rest-timer{font-size:72px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
.gym-rest-sub{font-size:14px;color:rgba(255,255,255,.4);}
.gym-skip-rest{background:rgba(255,255,255,.08);border:none;border-radius:14px;padding:12px 24px;color:rgba(255,255,255,.8);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:8px;}
.gym-nav{display:flex;gap:12px;margin-top:20px;}
.gym-nav-btn{flex:1;background:rgba(255,255,255,.06);border:none;border-radius:12px;padding:14px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;}
.gym-done{text-align:center;padding:20px 0;}
.gym-done-icon{font-size:64px;margin-bottom:12px;}
.gym-done-title{font-size:26px;font-weight:800;color:#fff;margin-bottom:8px;}
.gym-done-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:24px;}
.gym-done-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:24px;}
.gym-done-stat{background:rgba(255,255,255,.06);border-radius:14px;padding:14px;text-align:center;}
.gym-done-stat-val{font-size:22px;font-weight:800;color:var(--accent);}
.gym-done-stat-lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;}

.gym-set-dot{width:8px;height:8px;border-radius:4px;background:rgba(255,255,255,.15);transition:background .2s;}
.gym-set-dot.done{background:var(--accent);}
.gym-set-dot.current{background:#fff;}

.fab{position:fixed;bottom:76px;right:20px;z-index:90;}
.fab-main{width:52px;height:52px;border-radius:26px;background:var(--accent);border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(0,168,107,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;}

.fab-actions{position:absolute;bottom:60px;right:0;display:flex;flex-direction:column;gap:10px;align-items:flex-end;}
.fab-action{display:flex;align-items:center;gap:10px;animation:fabIn .2s ease;}

.fab-action-btn{width:44px;height:44px;border-radius:22px;background:var(--surface);border:none;font-size:20px;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;}
.fab-action-label{font-size:12px;font-weight:700;background:var(--text);color:#fff;padding:5px 10px;border-radius:20px;white-space:nowrap;}

.score-bars{flex:1;display:flex;flex-direction:column;gap:7px;}
.score-bar-row{display:flex;align-items:center;gap:8px;}
.score-bar-lbl{font-size:11px;font-weight:600;color:var(--muted);min-width:72px;}

.score-bar-fill{height:100%;border-radius:3px;transition:width .4s;}

.streak-day{width:12px;height:12px;border-radius:3px;background:var(--border);}
.streak-day.active{background:var(--accent);}

.ritual-row:last-child{border-bottom:none;}
.ritual-icon{font-size:24px;flex-shrink:0;}
.ritual-info{flex:1;}
.ritual-time{font-size:11px;font-weight:700;color:var(--accent);}
.ritual-name{font-size:14px;font-weight:700;color:var(--text);margin:1px 0;}
.ritual-detail{font-size:12.5px;color:var(--muted);line-height:1.5;}

.prev-perf-label{font-size:11px;font-weight:700;color:var(--accent-dk);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}

/* QUICK LOG MODAL */
.quick-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;}
.quick-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 16px 40px;width:100%;max-width:430px;animation:slideUp .2s ease;}

/* PROGRESS CHART */
.chart-wrap{position:relative;height:200px;margin:10px 0;}

/* PREDICTOR */
.predictor{background:linear-gradient(135deg,var(--accent-lt),#fff);border-radius:16px;padding:16px;margin-bottom:14px;border:1px solid var(--accent);}

.hydration-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.hydration-num{font-size:36px;font-weight:800;color:var(--blue);}
.hydration-unit{font-size:14px;color:var(--muted);}

/* GYM MODE BACK POSITION */
.gym-relative{position:relative;}

function getMealSupps(mealTime) {
  const t = mealTime.toLowerCase();
  const hr = parseInt(t.split(':')[0]);
  const isAm = t.includes('am');
  const mins = parseInt(t.split(':')[1]) || 0;
  const h24 = isAm ? hr : hr + 12;
  if (h24 >= 6 && h24 <= 9) return SUPPS.filter(s=>s.time==='With breakfast');
  if (h24 >= 10 && h24 <= 11) return SUPPS.filter(s=>s.time==='Post-workout + mid-morning'||s.time==='Post-workout (any time)');
  if (h24 >= 12 && h24 <= 14) return SUPPS.filter(s=>s.time==='With largest meal');
  if (h24 >= 19 && h24 <= 22) return SUPPS.filter(s=>s.time==='Before bed');
  return [];
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function useLS(key, def) {
  const [v, sv] = useState(() => {
    try { const x = localStorage.getItem(key); return x !== null ? JSON.parse(x) : def; }
    catch { return def; }
  });
  function set(valOrFn) {
    sv(prev => {
      const nv = typeof valOrFn === 'function' ? valOrFn(prev) : valOrFn;
      try { localStorage.setItem(key, JSON.stringify(nv)); } catch {}
      return nv;
    });
  }
  return [v, set];
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weeksElapsed(startDate) {
  if (!startDate) return 1;
  const days = Math.floor((new Date() - new Date(startDate)) / 864e5);
  return Math.max(1, Math.min(20, Math.floor(days/7)+1));
}

function getProgramDayIdx(startDate) {
  if (!startDate) return (new Date().getDay()+6)%7;
  const ms = new Date() - new Date(startDate);
  if (ms < 0) return (new Date().getDay()+6)%7;
  return Math.floor(ms / 86400000) % 7;
}

function getPhase(week) {
  if (week<=4) return {name:'ADAPTATION',short:'Adapt',tag:'Wk 1–4',num:0};
  if (week<=8) return {name:'FOUNDATION',short:'Foundation',tag:'Wk 5–8',num:1};
  if (week<=16) return {name:'BUILD',short:'Build',tag:'Wk 9–16',num:2};
  return {name:'SHRED',short:'Shred',tag:'Wk 17–20',num:3};
}

function greeting() {
  const h = new Date().getHours();
  if (h<12) return 'Good Morning';
  if (h<17) return 'Good Afternoon';
  return 'Good Evening';
}

function calcStreak(workoutDone, daily) {
  let streak = 0;
  const today = new Date();
  for (let i=1; i<=365; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (workoutDone[ds] || (daily[ds] && (daily[ds].morningDone||daily[ds].water>0))) streak++;
    else break;
  }
  const tds = todayStr();
  if (workoutDone[tds] || (daily[tds] && (daily[tds].morningDone||daily[tds].water>0))) streak++;
  return streak;
}

function calcTransformationScore(workoutDone, daily, weights, startDate) {
  const wk = weeksElapsed(startDate);
  const days7 = [];
  for (let i=0; i<7; i++) {
    const d = new Date(); d.setDate(d.getDate()-i);
    days7.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  const workoutDays = days7.filter(d=>workoutDone[d]).length;
  const workoutScore = Math.min(100, Math.round(workoutDays/5*100));
  const proteinDays = days7.filter(d=>daily[d]?.protein>0);
  const avgProtein = proteinDays.length ? proteinDays.reduce((s,d)=>s+(daily[d].protein||0),0)/proteinDays.length : 0;
  const proteinTarget = wk<=8?140:wk<=16?155:160;
  const nutritionScore = proteinDays.length ? Math.min(100,Math.round(avgProtein/proteinTarget*100)) : 50;
  const waterDays = days7.filter(d=>daily[d]?.water>0);
  const avgWater = waterDays.length ? waterDays.reduce((s,d)=>s+(daily[d].water||0),0)/waterDays.length : 0;
  const hydrationScore = waterDays.length ? Math.min(100,Math.round(avgWater/14*100)) : 50;
  const sleepDays = days7.filter(d=>daily[d]?.sleep>0);
  const avgSleep = sleepDays.length ? sleepDays.reduce((s,d)=>s+(daily[d].sleep||0),0)/sleepDays.length : 0;
  const sleepScore = sleepDays.length ? Math.min(100,Math.round(avgSleep/8*100)) : 50;
  const streak = calcStreak(workoutDone, daily);
  const consistencyScore = Math.min(100, Math.round(streak/14*100));
  const total = Math.round(workoutScore*0.3+nutritionScore*0.25+hydrationScore*0.2+consistencyScore*0.15+sleepScore*0.1);
  return {total,workout:workoutScore,nutrition:nutritionScore,hydration:hydrationScore,sleep:sleepScore,consistency:consistencyScore};
}

function generateCoachNotes(weights, workoutDone, daily, exLogs, startDate) {
  const notes = [];
  const today = new Date();
  if (weights.length>=3) {
    const sorted = [...weights].sort((a,b)=>new Date(b.date)-new Date(a.date));
    const recent = sorted.slice(0,5);
    const maxW = Math.max(...recent.map(w=>w.weight));
    const minW = Math.min(...recent.map(w=>w.weight));
    if (maxW-minW<0.4 && recent.length>=3) {
      notes.push({type:'warning',icon:'⚠️',color:'#F59E0B',msg:`Weight hasn't changed in ${recent.length}+ logs. Try reducing dinner rice by 40g and adding 10 min extra walking.`});
    }
  }
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  const yds = `${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
  if (!workoutDone[yds] && yesterday>=new Date(startDate||'2000-01-01')) {
    notes.push({type:'action',icon:'💪',color:'#3B82F6',msg:`You skipped yesterday's workout. Complete today's session without fail — consistency beats perfection.`});
  }
  const streak = calcStreak(workoutDone, daily);
  if (streak>=14) notes.push({type:'streak',icon:'🔥',color:'#EF4444',msg:`Incredible — ${streak}-day streak. You're in the top 5% of people who stick to a plan this long.`});
  else if (streak>=7) notes.push({type:'streak',icon:'🔥',color:'#EF4444',msg:`${streak}-day streak! You're building a real habit. Don't break it today.`});
  if (weights.length>=2) {
    const sorted = [...weights].sort((a,b)=>new Date(a.date)-new Date(b.date));
    const lost = sorted[0].weight - sorted[sorted.length-1].weight;
    if (lost>=5) notes.push({type:'success',icon:'🏆',color:'#00A86B',msg:`${lost.toFixed(1)}kg down! You're more than 1/3 of the way to your goal. Elite progress.`});
    else if (lost>=1) notes.push({type:'success',icon:'✅',color:'#00A86B',msg:`You've lost ${lost.toFixed(1)}kg so far. Imagine lifting that as a dumbbell — you used to carry that weight all day.`});
  }
  return notes.slice(0,3);
}

function getProgressPrediction(weights, startDate) {
  if (!weights||weights.length<2||!startDate) return null;
  const sorted = [...weights].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const lost = sorted[0].weight - sorted[sorted.length-1].weight;
  const wks = weeksElapsed(startDate);
  const ratePerWeek = lost/wks;
  if (ratePerWeek<=0) return null;
  const remaining = sorted[sorted.length-1].weight - TW;
  if (remaining<=0) return 'Goal reached!';
  const weeksLeft = Math.ceil(remaining/ratePerWeek);
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate()+weeksLeft*7);
  return targetDate.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
}

  if (activeMap[id]==='stabilizer') return '#EAB308';

  (muscles.secondary||[]).forEach(k=>m[k]='secondary');
  (muscles.stabilizers||[]).forEach(k=>m[k]='stabilizer');

}

// ── CALENDAR PICKER ────────────────────────────────────────────────────────
function CalendarPicker({onConfirm, onClose}) {
  const today = todayStr();
  const [selDate, setSelDate] = useState(today);
  const [calMonth, setCalMonth] = useState(() => {
    const d = new Date();
    return {year:d.getFullYear(), month:d.getMonth()};
  });
  const prevMonth = () => {
    setCalMonth(p => {
      if (p.month===0) return {year:p.year-1, month:11};
      return {year:p.year, month:p.month-1};
    });
  };
  const nextMonth = () => {
    setCalMonth(p => {
      if (p.month===11) return {year:p.year+1, month:0};
      return {year:p.year, month:p.month+1};
    });
  };
  const firstDay = new Date(calMonth.year, calMonth.month, 1).getDay();
  const daysInMonth = new Date(calMonth.year, calMonth.month+1, 0).getDate();
  const monthName = new Date(calMonth.year, calMonth.month).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const cells = [];
  for (let i=0; i<firstDay; i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${calMonth.year}-${String(calMonth.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({d, ds});
  }
  return (
    <div className="cal-modal" onClick={onClose}>
      <div className="cal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="cal-hdr-row">
          <button className="cal-nav" onClick={prevMonth}>&#8249;</button>
          <span className="cal-title">{monthName}</span>
          <button className="cal-nav" onClick={nextMonth}>&#8250;</button>
        </div>
        <div className="cal-grid">
          {['S','M','T','W','T','F','S'].map((d,i)=><div key={i} className="cal-dh">{d}</div>)}
          {cells.map((cell,i)=>{
            if (!cell) return <div key={i} className="cal-d empty"/>;
            const isFuture = cell.ds > today;
            const isToday = cell.ds===today;
            const isSel = cell.ds===selDate;
            return (
              <div key={i}
                className={`cal-d ${isToday&&!isSel?'today':''} ${isSel?'selected':''} ${isFuture?'future':''}`}
                onClick={()=>!isFuture&&setSelDate(cell.ds)}>
                {cell.d}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:20}}>
          <button className="btn btn-primary btn-block" onClick={()=>onConfirm(selDate)}>
            Set as Start Date
          </button>
        </div>
      </div>
    </div>
  );
}

function GymMode({exercises, onClose, onComplete, exLogs, todayDate}) {
  const [exIdx, setExIdx] = useState(0);
  const [setIdx, setSetIdx] = useState(0);
  const [weight, setWeight] = useState('');
  const [reps, setReps] = useState('');
  const [setLogs, setSetLogs] = useState({});
  const [resting, setResting] = useState(false);
  const [restSec, setRestSec] = useState(90);
  const [done, setDone] = useState(false);
  const [startTime] = useState(Date.now());
  const timerRef = useRef(null);

  const ex = exercises[exIdx];
  const totalSets = ex ? (ex.sets||3) : 0;
  const thisSetLogs = setLogs[exIdx] || [];

  useEffect(()=>{
    if (resting && restSec>0) {
      timerRef.current = setInterval(()=>{
        setRestSec(s=>{
          if (s<=1) { clearInterval(timerRef.current); setResting(false); return 0; }
          return s-1;
        });
      },1000);
    }
    return ()=>clearInterval(timerRef.current);
  },[resting]);

  function prevLog() {
    if (!exLogs||!ex) return null;
    const dates = Object.keys(exLogs).sort().reverse();
    for (const d of dates) {
      if (exLogs[d][ex.name]?.length>0) {
        const sets = exLogs[d][ex.name];
        const fmtDate = new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
        return `${fmtDate}: ${sets.map(s=>`${s.weight}kg×${s.reps}`).join(', ')}`;
      }
    }
    return null;
  }

  function coachSuggestion() {
    if (!exLogs||!ex) return null;
    const dates = Object.keys(exLogs).sort().reverse();
    for (const d of dates) {
      const sets = exLogs[d]?.[ex.name];
      if (sets?.length>0) {
        const allHit = sets.every(s=>s.reps>=10);
        const lastWeight = sets[0].weight;
        if (allHit && lastWeight>0) return `Try ${lastWeight+2}kg today — you hit all reps last time!`;
        return null;
      }
    }
    return null;
  }

  function completeSet() {
    const w = parseFloat(weight)||0;
    const r = parseInt(reps)||0;
    const newLogs = {...setLogs};
    if (!newLogs[exIdx]) newLogs[exIdx]=[];
    newLogs[exIdx] = [...newLogs[exIdx], {weight:w,reps:r}];
    setSetLogs(newLogs);
    const restDur = ex?.restSeconds||90;
    if (setIdx < totalSets-1) {
      setSetIdx(i=>i+1);
      setWeight(''); setReps('');
      setResting(true); setRestSec(restDur);
    } else {
      // advance to next exercise
      setResting(true); setRestSec(restDur);
      setTimeout(()=>{
        if (exIdx < exercises.length-1) {
          setExIdx(i=>i+1); setSetIdx(0); setWeight(''); setReps('');
          setResting(false);
        } else {
          setResting(false); setDone(true);
        }
      },(restDur*1000)+100);
    }
  }

  function skipRest() {
    clearInterval(timerRef.current);
    setResting(false);
    if (setIdx >= totalSets-1 && exIdx < exercises.length-1) {
      setExIdx(i=>i+1); setSetIdx(0); setWeight(''); setReps('');
    } else if (exIdx >= exercises.length-1) {
      setDone(true);
    }
  }

  function markComplete() {
    const logsToSave = {};
    exercises.forEach((e,i)=>{
      if (setLogs[i]?.length>0) logsToSave[e.name] = setLogs[i];
    });
    onComplete(logsToSave);
  }

  const mins = Math.floor((Date.now()-startTime)/60000);

  if (done) {
    const totalSetsCompleted = Object.values(setLogs).reduce((s,arr)=>s+arr.length,0);
    const exCompleted = Object.keys(setLogs).length;
    return (
      <div className="gym-overlay">
        <div style={{padding:'20px',paddingTop:'60px'}}>
          <div className="gym-done">
            <div className="gym-done-icon">💪</div>
            <div className="gym-done-title">Workout Complete!</div>
            <div className="gym-done-sub">Outstanding work, Piyush.</div>
            <div className="gym-done-stats">
              <div className="gym-done-stat"><div className="gym-done-stat-val">{exCompleted}</div><div className="gym-done-stat-lbl">Exercises</div></div>
              <div className="gym-done-stat"><div className="gym-done-stat-val">{totalSetsCompleted}</div><div className="gym-done-stat-lbl">Sets Done</div></div>
              <div className="gym-done-stat"><div className="gym-done-stat-val">{mins}m</div><div className="gym-done-stat-lbl">Duration</div></div>
            </div>
            <button className="gym-btn-complete" onClick={markComplete}>Mark Workout Complete</button>
            <button className="gym-btn-skip" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    );
  }

  const progress = exercises.length > 0 ? ((exIdx)/exercises.length)*100 : 0;
  const pl = prevLog();
  const suggestion = coachSuggestion();

  return (
    <div className="gym-overlay gym-relative">
      <div className="gym-header">
        <div style={{color:'rgba(255,255,255,.5)',fontSize:13,fontWeight:700}}>{exIdx+1} / {exercises.length}</div>
        <button className="gym-close" onClick={onClose}>✕</button>
      </div>
      <div className="gym-progress-bar">
        <div className="gym-progress-fill" style={{width:`${progress}%`}}/>
      </div>
      <div className="gym-body">
        <div className="gym-ex-num">Exercise {exIdx+1} of {exercises.length}</div>
        <div className="gym-ex-name">{ex?.name}</div>
        <div className="gym-ex-muscle">{ex?.muscle}</div>

        {pl && (
          <div className="gym-prev">
            <div className="gym-prev-label">Previous</div>
            <div className="gym-prev-val">{pl}</div>
          </div>
        )}
        {suggestion && (
          <div style={{background:'rgba(0,168,107,.12)',borderRadius:12,padding:'10px 14px',marginBottom:16}}>
            <div style={{fontSize:13,color:'#00A86B',fontWeight:600}}>🎯 {suggestion}</div>
          </div>
        )}

        <div className="gym-set-label">Set {setIdx+1} of {totalSets}</div>
        <div className="gym-set-dots">
          {Array.from({length:totalSets}).map((_,i)=>(
            <div key={i} className={`gym-set-dot ${i<thisSetLogs.length?'done':i===thisSetLogs.length?'current':''}`}/>
          ))}
        </div>
        <div className="gym-inputs">
          <div className="gym-input-wrap">
            <div className="gym-input-lbl">Weight (kg)</div>
            <input className="gym-input" type="number" inputMode="decimal" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="0"/>
          </div>
          <div className="gym-input-wrap">
            <div className="gym-input-lbl">Reps</div>
            <input className="gym-input" type="number" inputMode="numeric" value={reps} onChange={e=>setReps(e.target.value)} placeholder="0"/>
          </div>
        </div>
        <button className="gym-btn-complete" onClick={completeSet}>Complete Set {setIdx+1}</button>
        <button className="gym-btn-skip" onClick={()=>{
          if (exIdx<exercises.length-1){setExIdx(i=>i+1);setSetIdx(0);setWeight('');setReps('');}
          else setDone(true);
        }}>Skip Exercise</button>

        <div className="gym-nav" style={{marginTop:24}}>
          <button className="gym-nav-btn" onClick={()=>{if(exIdx>0){setExIdx(i=>i-1);setSetIdx(0);setWeight('');setReps('');}}}>← Prev</button>
          <button className="gym-nav-btn" onClick={()=>{if(exIdx<exercises.length-1){setExIdx(i=>i+1);setSetIdx(0);setWeight('');setReps('');}else setDone(true);}}>Next →</button>
        </div>
      </div>

      {resting && (
        <div className="gym-rest-overlay">
          <div className="gym-rest-label">Resting</div>
          <div className="gym-rest-timer">{Math.floor(restSec/60)}:{String(restSec%60).padStart(2,'0')}</div>
          <div className="gym-rest-sub">Next: Set {setIdx+1} of {totalSets}</div>
          <button className="gym-skip-rest" onClick={skipRest}>Skip Rest</button>
        </div>
      )}
    </div>
  );
}

// ── HOME TAB ───────────────────────────────────────────────────────────────
function HomeTab({startDate, setStartDate, weights, workoutDone, daily, setDaily, exLogs, onStartWorkout, measurements}) {
  const [showCal, setShowCal] = useState(false);
  const [showRitual, setShowRitual] = useState(true);
  const [showSupps, setShowSupps] = useState(false);
  const weekChartRef = useRef(null);
  const weekChartInstance = useRef(null);
  const today = todayStr();
  const todayData = daily[today] || {};
  const wk = weeksElapsed(startDate);
  const phase = getPhase(wk);
  const dayOfWeek = getProgramDayIdx(startDate);
  const todayDayData = DAYS[dayOfWeek];
  const streak = calcStreak(workoutDone, daily);
  const score = calcTransformationScore(workoutDone, daily, weights, startDate);
  const coachNotes = generateCoachNotes(weights, workoutDone, daily, exLogs, startDate);
  const prediction = getProgressPrediction(weights, startDate);

  const latestWeight = weights.length > 0
    ? [...weights].sort((a,b)=>new Date(b.date)-new Date(a.date))[0].weight
    : SW;
  const firstWeight = weights.length > 0
    ? [...weights].sort((a,b)=>new Date(a.date)-new Date(b.date))[0].weight
    : SW;
  const lostKg = firstWeight - latestWeight;
  const progressPct = Math.min(100, Math.max(0, Math.round(lostKg/(SW-TW)*100)));
  const weeksLeft = 20 - wk;

  const dateStr = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'});
  const dayNum = startDate ? Math.floor((new Date()-new Date(startDate))/864e5)+1 : 1;

  function cycleMission(key) {
    setDaily(prev => {
      const td = prev[today] || {};
      const cur = td[key];
      const next = !cur ? true : cur === true ? 'skip' : undefined;
      return {...prev, [today]:{...td, [key]:next}};
    });
  }

  function cycleRitual(key) {
    setDaily(prev => {
      const td = prev[today] || {};
      const cur = td[key];
      const next = !cur ? true : cur === true ? 'skip' : undefined;
      return {...prev, [today]:{...td, [key]:next}};
    });
  }

  const missionItems = [
    {key:'morningDone', label:'Morning Ritual', icon:'🌅', state:todayData.morningDone||false, cyclic:true},
    {key:'workoutDone2', label:'Workout', icon:'🏋️', state:workoutDone[today]==='rest'?'skip':workoutDone[today]===true?true:false, isNav:true},
    {key:'proteinHit', label:'Protein Target', icon:'🥩', state:!!((todayData.protein||0)>=100), auto:true},
    {key:'waterHit', label:'3L Water', icon:'💧', state:!!((todayData.water||0)>=14), auto:true},
    {key:'suppsDone', label:'Supplements', icon:'💊', state:todayData.suppsDone||false, cyclic:true},
    {key:'sleepDone', label:'Sleep 8h', icon:'😴', state:(todayData.sleep||0)>=7?true:todayData.sleepDone||false, cyclic:true},
  ];

  const phaseColors = ['#00A86B','#3B82F6','#F59E0B','#EF4444'];

  useEffect(()=>{
    if(!weekChartRef.current||!startDate) return;
    if(weekChartInstance.current) weekChartInstance.current.destroy();
    const labels=[],doneData=[],restData=[],missedData=[];
    for(let w=1;w<=wk;w++){
      const ws=new Date(startDate);
      ws.setDate(ws.getDate()+(w-1)*7);
      let done=0,rest=0,missed=0;
      for(let d=0;d<7;d++){
        const dt=new Date(ws); dt.setDate(dt.getDate()+d);
        if(dt>new Date()) continue;
        const ds=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        const s=workoutDone[ds];
        if(s===true) done++;
        else if(s==='rest') rest++;
        else missed++;
      }
      labels.push(`Wk ${w}`);
      doneData.push(done); restData.push(rest); missedData.push(missed);
    }
    weekChartInstance.current=new Chart(weekChartRef.current.getContext('2d'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'Done',data:doneData,backgroundColor:'#00A86B',borderRadius:4,borderSkipped:false},
        {label:'Rest',data:restData,backgroundColor:'#F59E0B',borderRadius:4,borderSkipped:false},
        {label:'Missed',data:missedData,backgroundColor:'#E5E7EB',borderRadius:4,borderSkipped:false},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw} day${c.raw!==1?'s':''}`}}},
        scales:{
          x:{stacked:true,grid:{display:false},ticks:{color:'#999',font:{size:10}}},
          y:{stacked:true,grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#999',font:{size:10},stepSize:1},max:7,beginAtZero:true}
        }
      }
    });
    return()=>weekChartInstance.current?.destroy();
  },[workoutDone,startDate,wk]);

  return (
    <div className="content">
      {/* GREETING */}
      <div className="card" style={{background:'linear-gradient(135deg,var(--accent) 0%,var(--accent-dk) 100%)',color:'#fff'}}>
        <div style={{fontSize:13,opacity:.8,marginBottom:2}}>{dateStr}</div>
        <div style={{fontSize:24,fontWeight:800,marginBottom:4}}>{greeting()}, Piyush 👋</div>
        <div style={{fontSize:13,opacity:.85}}>
          Day {dayNum} of 140 &nbsp;•&nbsp; Week {wk} &nbsp;•&nbsp;
          <span style={{background:'rgba(255,255,255,.2)',borderRadius:6,padding:'1px 7px',fontWeight:700}}>{phase.name}</span>
        </div>
      </div>

      {/* SET YOUR START DATE */}
      {!startDate && (
        <div className="card" style={{border:'2px dashed var(--accent)',background:'var(--accent-lt)',textAlign:'center',padding:'20px 16px'}}>
          <div style={{fontSize:22,marginBottom:8}}>📅</div>
          <div style={{fontSize:15,fontWeight:800,color:'var(--accent-dk)',marginBottom:6}}>Set Your Start Date</div>
          <div style={{fontSize:13,color:'var(--text2)',marginBottom:14}}>Lock in your Day 1 to activate week tracking, streak counting, and your 20-week roadmap.</div>
          <input type="date" style={{padding:'10px 14px',borderRadius:10,border:'1.5px solid var(--accent)',
            fontSize:14,fontFamily:'inherit',color:'var(--text)',background:'#fff',width:'100%',boxSizing:'border-box',marginBottom:10}}
            onChange={e=>e.target.value&&setStartDate(e.target.value)}/>
        </div>
      )}

      {/* WEEKLY REMINDER */}
      {(()=>{
        const d=new Date(); const day=d.getDay(); const hr=d.getHours();
        if(day===6&&hr>=17) return (
          <div className="card" style={{background:'#FFF7ED',border:'1px solid #FED7AA',padding:'14px 16px'}}>
            <div style={{fontSize:14,fontWeight:800,color:'#C2410C',marginBottom:4}}>📸 Saturday Check-In</div>
            <div style={{fontSize:13,color:'#92400E',lineHeight:1.6}}>After gym — log your <strong>progress photo</strong> and <strong>body measurements</strong> in the Progress tab. Same lighting, same time, same pose.</div>

            <div style={{fontSize:14,fontWeight:800,color:'#166534',marginBottom:4}}>⚖️ Sunday Weigh-In</div>
            <div style={{fontSize:13,color:'#166634',lineHeight:1.6}}>First thing this morning — log your <strong>weight</strong> in Progress. Before food, after toilet, consistent conditions every week.</div>
          </div>
        );
        return null;
      })()}

      {/* STATS ROW */}
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-val">{latestWeight}<span className="stat-unit" style={{fontSize:13}}>kg</span></div>

              </div>
            </div>
          ))}

      {/* WEEKLY COMPLETION CHART */}

        <div className="card">
          <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:2}}>Weekly Completion</div>

          <div style={{display:'flex',gap:16,marginTop:10}}>

            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}><div style={{width:10,height:10,borderRadius:2,background:'#F59E0B'}}/> Rest</div>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}><div style={{width:10,height:10,borderRadius:2,background:'#E5E7EB'}}/> Missed</div>
          </div>
        </div>
      )}

      {/* PROGRESS PREDICTOR */}
      {prediction && (
        <div className="predictor">
          <div style={{fontSize:11,fontWeight:700,color:'var(--accent-dk)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>
            Progress Predictor
          </div>
          <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>
            At current pace, you'll reach 75 kg by
          </div>
          <div style={{fontSize:20,fontWeight:800,color:'var(--accent)',marginTop:4}}>{prediction}</div>
        </div>
      )}


      {showCal && <CalendarPicker onConfirm={d=>{setStartDate(d);setShowCal(false);}} onClose={()=>setShowCal(false)}/>}
    </div>
  );
}

}

// ── TRAIN TAB ──────────────────────────────────────────────────────────────
function TrainTab({startDate, workoutDone, setWorkoutDone, daily, setDaily, exLogs, setExLogs}) {
  const today = todayStr();
  const todayDayIdx = getProgramDayIdx(startDate);
  const [selDay, setSelDay] = useState(todayDayIdx);
  const [showWarmup, setShowWarmup] = useState(true);
  const [showExercises, setShowExercises] = useState(true);
  const [showCore, setShowCore] = useState(true);
  const [showCooldown, setShowCooldown] = useState(false);
  const [showCardio, setShowCardio] = useState(true);
  const [gymActive, setGymActive] = useState(false);
  const [checkedEx, setCheckedEx] = useState({});
  const wk = weeksElapsed(startDate);
  const isToday = selDay===todayDayIdx;
  const dayData = DAYS[selDay];

  function getExercises() {
    if (wk<=4) return dayData.adaptExercises || dayData.mainExercises || [];
    if (wk<=8) {
      if (selDay===5 && dayData.p1Exercises) return dayData.p1Exercises;
      return dayData.mainExercises || dayData.adaptExercises || [];
    }
    if (dayData.mainExercises) return dayData.mainExercises;
    return dayData.adaptExercises || [];
  }

  const cardio = wk<=4 ? dayData.adaptCardio : dayData.mainCardio;
  const exercises = getExercises().filter(ex=>!ex.muscle?.toLowerCase().includes('cardio'));

  function startGym() {
    setGymActive(true);
  }

  function markRestDay() {
    setWorkoutDone(prev=>({...prev,[today]:'rest'}));
  }

  function unmarkRestDay() {
    setWorkoutDone(prev=>{const n={...prev}; delete n[today]; return n;});
  }

  function completeGym(logsMap) {
    setGymActive(false);
    if (isToday) {
      setWorkoutDone(prev=>({...prev,[today]:true}));
      setExLogs(prev=>{
        const updated = {...prev};
        if (!updated[today]) updated[today]={};
        Object.entries(logsMap).forEach(([name,sets])=>{
          updated[today][name]=sets;
        });
        return updated;
      });
    }
  }

  const todayDateExLogs = exLogs[today]||{};

  if (gymActive) {
    return <GymMode exercises={exercises} onClose={()=>setGymActive(false)}
      onComplete={completeGym} exLogs={exLogs} todayDate={today}/>;
  }

  return (
    <div className="content">
      {/* WEEK HEADING */}
      <div style={{marginBottom:12}}>
        <div style={{fontSize:22,fontWeight:900,color:'var(--text)',letterSpacing:'-0.3px',lineHeight:1.1}}>
          Week {wk} <span style={{color:'var(--accent)',fontWeight:700}}>· {getPhase(wk).name}</span>
        </div>
        <div style={{fontSize:12,color:'var(--muted)',fontWeight:600,marginTop:3}}>{getPhase(wk).tag}</div>
      </div>

      {/* DAY SELECTOR */}
      <div className="day-pills">
        {DAYS.map((d,i)=>(
          <button key={i}
            className={`day-pill ${selDay===i?'active':''} ${i===todayDayIdx&&selDay!==i?'today-hl':''}`}
            onClick={()=>setSelDay(i)}>
            {d.short}
          </button>
        ))}
      </div>

      {/* STATUS ROW */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span className={`tag-pill tag-${dayData.tag.toLowerCase().replace(' ','').replace('fullbody','full')}`}>
          {dayData.tag}
        </span>
        {isToday && workoutDone[today]===true && (
          <span style={{fontSize:12,color:'var(--accent)',fontWeight:700,marginLeft:'auto'}}>✓ Done today</span>
        )}
        {isToday && workoutDone[today]==='rest' && (
          <span style={{fontSize:12,color:'var(--muted)',fontWeight:700,marginLeft:'auto'}}>😴 Rest day</span>
        )}
      </div>

      {/* CURRENT PHASE CONTEXT */}
      {(()=>{
        const PHASE_INFO=[
          {name:'ADAPTATION',wks:'Wk 1–4',desc:'Machines only. Master movement patterns. 20 min cardio after every session. Gut adaptation begins. Half-scoop whey.',color:'#00A86B'},
          {name:'FOUNDATION',wks:'Wk 5–8',desc:'Free weights unlock. Introduce barbell movements. Build the habit of 5 sessions/week. Full scoop whey + creatine.',color:'#3B82F6'},
          {name:'BUILD',wks:'Wk 9–16',desc:'Progressive overload every 2 weeks. Compound lifts. Calories slightly increase. Muscle takes shape.',color:'#F59E0B'},
          {name:'SHRED',wks:'Wk 17–20',desc:'Calorie deficit. High protein to protect muscle. Reduce carbs, increase veg. Final push to 75 kg.',color:'#EF4444'},
        ];
        const ph=PHASE_INFO[getPhase(wk).num];
        return (
          <div style={{background:`${ph.color}0d`,border:`1px solid ${ph.color}33`,borderRadius:12,padding:'10px 14px',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontSize:11,fontWeight:900,color:ph.color,letterSpacing:'.08em'}}>{ph.name}</span>
              <span style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>{ph.wks}</span>
              <span style={{fontSize:11,fontWeight:700,color:ph.color,marginLeft:'auto'}}>You are here</span>
            </div>
            <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>{ph.desc}</div>
          </div>
        );

      {dayData.tag==='REST' ? (
        <div style={{background:'#F0FDF4',border:'1px solid #BBF7D0',borderRadius:12,padding:'14px 16px',marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:800,color:'#166534',marginBottom:4}}>🌿 Rest & Recovery Day</div>
          <div style={{fontSize:13,color:'#166634',lineHeight:1.6}}>No gym today. Focus on sleep, hydration, light walking, and stretching. Recovery is where muscles actually grow.</div>
        </div>
      ) : isToday && (
        workoutDone[today]==='rest' ? (
          <div style={{background:'#F3F4F6',borderRadius:12,padding:'12px 16px',marginBottom:12,
            display:'flex',alignItems:'center',justifyContent:'space-between'}}>

            textAlign:'center',fontSize:13,fontWeight:700,color:'var(--accent-dk)'}}>
            ✓ Workout completed!

        ) : (
          <>
            <button className="btn btn-primary btn-block" style={{marginBottom:8}} onClick={startGym}>
              ▶ Start Workout
            </button>
            <button onClick={markRestDay}
              style={{width:'100%',marginBottom:12,background:'var(--bg)',border:'1.5px solid var(--border)',
                color:'var(--muted)',borderRadius:12,padding:'10px 16px',fontSize:13,fontWeight:700,
                fontFamily:'inherit',cursor:'pointer'}}>
              😴 Mark as Rest Day
            </button>
          </>
        )
      )}

      {/* WARMUP */}
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        <button className="section-toggle" onClick={()=>setShowWarmup(v=>!v)}>
          <span className="section-toggle-label">🔥 Warm-Up <span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>(6 items)</span></span>
          <span className={`chevron ${showWarmup?'open':''}`}>▼</span>
        </button>
        {showWarmup && (
          <div style={{padding:'0 16px 16px'}}>
            {WARMUP.map((w,i)=>(
              <div key={i} className="wu-item">
                <span className="wu-icon"><WuIcon name={w.name}/></span>
                <div><div className="wu-name">{w.name}</div><div className="wu-detail">{w.detail}</div></div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* EXERCISES */}
      <div className="card" style={{padding:0,overflow:'hidden',marginTop:14}}>
        <button className="section-toggle" onClick={()=>setShowExercises(v=>!v)}>
          <span className="section-toggle-label">💪 Exercises <span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>({exercises.length} exercises)</span></span>
          <span className={`chevron ${showExercises?'open':''}`}>▼</span>

        {showExercises && (
          <div style={{padding:'0 12px 12px'}}>
            {exercises.map((ex,i)=>(
              <ExerciseCard key={i} ex={ex} idx={i} isToday={isToday}
                exLogsForDay={exLogs} week={wk}
                checked={!!checkedEx[i]}
                onCheck={()=>setCheckedEx(p=>({...p,[i]:!p[i]}))}/>
            ))}
          </div>
        )}
      </div>

      {/* CORE */}
      {dayData.core && dayData.core.length>0 && (
        <div className="card" style={{padding:0,overflow:'hidden',marginTop:14}}>
          <button className="section-toggle" onClick={()=>setShowCore(v=>!v)}>

          {showCore && (

              {dayData.core.map((c,i)=>(
                <div key={i} className="core-item">
                  <div style={{flex:1}}>
                    <div className="core-name">{c.name}</div>
                    <div className="core-meta">{c.sets} sets × {c.reps}{c.restSeconds?` • ${c.restSeconds}s rest`:''}</div>
                    <div className="core-tip">{c.tip}</div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* COOLDOWN */}
      <div className="card" style={{padding:0,overflow:'hidden',marginTop:14}}>
        <button className="section-toggle" onClick={()=>setShowCooldown(v=>!v)}>
          <span className="section-toggle-label">🧘 Cool-Down & Stretch <span style={{fontSize:11,color:'var(--muted)',fontWeight:500}}>(6 items)</span></span>
          <span className={`chevron ${showCooldown?'open':''}`}>▼</span>
        </button>
        {showCooldown && (
          <div style={{padding:'0 16px 16px'}}>
            {COOLDOWN.map((w,i)=>(
              <div key={i} className="wu-item">
                <span className="wu-icon"><WuIcon name={w.name}/></span>
                <div><div className="wu-name">{w.name}</div><div className="wu-detail">{w.detail}</div></div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* CARDIO — after cooldown, end of session */}
      {cardio && (
        <div className="card" style={{padding:0,overflow:'hidden',marginTop:14}}>
          <button className="section-toggle" onClick={()=>setShowCardio(v=>!v)}>
            <span className="section-toggle-label">❤️ Cardio</span>
            <span className={`chevron ${showCardio?'open':''}`}>▼</span>

          {showCardio && (
            <div style={{padding:'0 16px 16px',display:'flex',gap:14,alignItems:'flex-start'}}>

    </div>
  );

// ── FUEL TAB ───────────────────────────────────────────────────────────────
function FuelTab({daily, setDaily, startDate}) {
  const today = todayStr();
  const todayJS = new Date();
  const dayOfWeek = todayJS.getDay();
  const isEggDay = EGG_DAYS.includes(dayOfWeek);
  const todayDayIdx = getProgramDayIdx(startDate);
  const dayLabels = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const [selPhase, setSelPhase] = useState(0);
  const [selDay, setSelDay] = useState(todayDayIdx);
  const [expandedMeal, setExpandedMeal] = useState(null);
  const todayData = daily[today]||{};

  const phase = DIET[selPhase];
  const dayData = phase?.days[selDay];
  const isToday = selDay===todayDayIdx;

  function toggleMeal(key) {
    setExpandedMeal(expandedMeal===key?null:key);
  }

  function timeToMins(t) {
    const pm=t.toLowerCase().includes('pm'); const am=t.toLowerCase().includes('am');
    const [hStr,mStr]=t.toLowerCase().replace('am','').replace('pm','').split(':');
    const h=parseInt(hStr); const m=parseInt(mStr)||0;
    const h24=pm&&h!==12?h+12:(!pm&&!am?h:h===12&&am?0:h);
    return h24*60+m;
  }

  function parseMacros(str) {
    if (!str) return {};
    const m = {};
    str.split(' ').forEach(part=>{
      const [k,v]=part.split(':');
      if (k&&v) m[k.toLowerCase()]=v;
    });
    return m;
  }

  return (
    <div className="content">
      {/* DAILY TARGETS */}
      <div style={{background:'var(--surface)',borderRadius:14,padding:'12px 14px',marginBottom:10,boxShadow:'var(--card-shadow)',border:'1px solid var(--border)'}}>
        <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Daily Targets</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div style={{background:'#FFF7ED',borderRadius:10,padding:'10px 12px',border:'1px solid #FED7AA'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C2410C" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'block',marginBottom:5}}>
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
            </svg>
            <div style={{fontSize:20,fontWeight:900,color:'#C2410C',lineHeight:1}}>{phase?.cal}</div>
            <div style={{fontSize:11,color:'#D97706',fontWeight:700,marginTop:4}}>Energy Target</div>
          </div>
          <div style={{background:'#F0FDF4',borderRadius:10,padding:'10px 12px',border:'1px solid #BBF7D0'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#166534" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{display:'block',marginBottom:5}}>
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <div style={{fontSize:20,fontWeight:900,color:'#166534',lineHeight:1}}>{phase?.prot}</div>
            <div style={{fontSize:11,color:'#059669',fontWeight:700,marginTop:4}}>Protein Target</div>
          </div>
        </div>
      </div>
      <div className="phase-tabs">
        {DIET.map((d,i)=>(
          <button key={i} className={`phase-tab ${selPhase===i?'active':''}`} onClick={()=>setSelPhase(i)}>
            {d.week}
          </button>
        ))}
      </div>

      {/* DAY SELECTOR */}
      <div className="day-pills">
        {dayLabels.map((d,i)=>(
          <button key={i} className={`day-pill ${selDay===i?'active':''} ${i===todayDayIdx&&selDay!==i?'today-hl':''}`}
            onClick={()=>setSelDay(i)}>
            {d.slice(0,3)}
          </button>
        ))}
      </div>

      {/* MEALS */}
      <div className="meal-card" style={{background:'#FFFBEB',border:'1px solid #FED7AA'}}>
        <div className="meal-hdr" style={{cursor:'default'}}>
          <span className="meal-time" style={{color:'#D97706'}}>6:00am</span>
          <span className="meal-name">🍋 Hot Water + Lemon</span>
        </div>
      </div>
      {(()=>{
        const greenTea={time:'4:30pm',name:'🍵 Green Tea',isGreenTea:true};
        const rawMeals=dayData?.meals||[];
        const allMeals=[...rawMeals,greenTea].sort((a,b)=>timeToMins(a.time)-timeToMins(b.time));
        const shown=new Set();
        const suppsByKey={};
        allMeals.forEach(meal=>{
          if(meal.isGreenTea){suppsByKey[meal.time]=[];return;}
          const raw=getMealSupps(meal.time);
          const unique=raw.filter(s=>!shown.has(s.name));
          unique.forEach(s=>shown.add(s.name));
          suppsByKey[meal.time]=unique;
        });
        return allMeals.map((meal,i)=>{
          if(meal.isGreenTea) return (
            <div key="gt" className="meal-card" style={{background:'#F0FDF4',border:'1px solid #BBF7D0'}}>
              <div className="meal-hdr" style={{cursor:'default'}}>
                <span className="meal-time" style={{color:'#059669'}}>{meal.time}</span>
                <span className="meal-name">{meal.name}</span>

              </div>
            </div>
          );
          const macros=parseMacros(meal.macros);
          const supps=suppsByKey[meal.time]||[];
          return (
            <div key={meal.time} className="meal-card">
              <button className="meal-hdr" onClick={()=>toggleMeal(meal.time)}>
                <span className="meal-time">{meal.time}</span>
                <span className="meal-name">{meal.name}</span>
                <span className="mpill mpill-p">{macros.p}</span>
                <span style={{fontSize:12,color:'var(--muted)',marginLeft:4}}>{expandedMeal===meal.time?'▲':'▼'}</span>
              </button>
              {expandedMeal===meal.time && (
                <div className="meal-body">
                  <div className="meal-detail">{meal.detail}</div>
                  <div className="macro-pills">
                    <span className="mpill mpill-p">Protein {macros.p}</span>
                    <span className="mpill mpill-c">Carbs {macros.c}</span>
                    <span className="mpill mpill-f">Fat {macros.f}</span>
                  </div>
                  {supps.length>0 && (
                    <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)'}}>
                      <div style={{fontSize:10,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>Take with this meal</div>
                      {supps.map((s,si)=>(
                        <div key={si} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                          <span style={{fontSize:14}}>{s.icon}</span>
                          <span style={{fontSize:12,fontWeight:700,color:'var(--text)',flex:1}}>{s.name}</span>
                          <span style={{fontSize:11,fontWeight:700,color:'var(--accent)',background:'var(--accent-lt)',padding:'2px 7px',borderRadius:6}}>{s.dose}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        });
      })()}

      {/* IBS KITCHEN RULES */}
      <div className="alert alert-blue" style={{fontSize:12,marginTop:8}}>
        <strong>IBS Kitchen Rules:</strong> Never use garlic or onion. Always use hing (asafoetida) as the substitute. Use cumin seeds, ginger, turmeric freely. Avoid high-FODMAP foods.
      </div>
    </div>
  );
}
