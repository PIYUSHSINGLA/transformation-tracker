  const [measError, setMeasError] = useState('');
  useEffect(()=>{ setMeasEdit({...measurements}); },[measurements.updatedAt]);
  const [viewPhoto, setViewPhoto] = useState(null);
  const [showAllWeights, setShowAllWeights] = useState(false);
  const [measHistory, setMeasHistory] = useLS('pf_meas_history', []);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const measChartRef = useRef(null);
  const measChartInstance = useRef(null);
  const today = todayStr();
  const prediction = getProgressPrediction(weights, startDate);
  const wk = weeksElapsed(startDate);

  const sortedWeights = useMemo(()=>[...weights].sort((a,b)=>new Date(a.date)-new Date(b.date)),[weights]);

  useEffect(()=>{
    if (!chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();
    if (sortedWeights.length===0) return;
    const ctx = chartRef.current.getContext('2d');
    chartInstance.current = new Chart(ctx, {
      type:'line',
      data:{
        labels:sortedWeights.map(w=>new Date(w.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})),
        datasets:[
          {label:'Weight (kg)',data:sortedWeights.map(w=>w.weight),borderColor:'#00A86B',backgroundColor:'rgba(0,168,107,.1)',
           borderWidth:2.5,fill:true,pointRadius:4,pointBackgroundColor:'#00A86B',tension:0.3},
          {label:'Target (75 kg)',data:sortedWeights.map(()=>75),borderColor:'#F59E0B',borderDash:[6,4],
           borderWidth:1.5,pointRadius:0,fill:false},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#999',font:{size:11}}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#999',font:{size:11}},
            min:Math.max(60,Math.min(...sortedWeights.map(w=>w.weight))-2),
            max:Math.max(...sortedWeights.map(w=>w.weight))+2}
        }
      }
    });
    return ()=>chartInstance.current?.destroy();
  },[sortedWeights]);

  const sortedMeasHistory = useMemo(()=>[...measHistory].sort((a,b)=>new Date(a.date)-new Date(b.date)),[measHistory]);

  useEffect(()=>{
    if (!measChartRef.current || sortedMeasHistory.length<2) return;
    if (measChartInstance.current) measChartInstance.current.destroy();
    const labels = sortedMeasHistory.map(e=>new Date(e.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'}));
    const MEAS_COLORS = {chest:'#3B82F6',waist:'#EF4444',arm:'#F59E0B',thigh:'#8B5CF6'};
    const datasets = measFields
      .filter(f=>sortedMeasHistory.some(e=>e[f.key]!=null))
      .map(f=>({
        label:f.label.split(' ')[0],
        data:sortedMeasHistory.map(e=>e[f.key]||null),
        borderColor:MEAS_COLORS[f.key],
        backgroundColor:MEAS_COLORS[f.key]+'22',
        borderWidth:2,fill:false,pointRadius:4,
        pointBackgroundColor:MEAS_COLORS[f.key],tension:0.3,spanGaps:true,
      }));
    measChartInstance.current = new Chart(measChartRef.current.getContext('2d'),{
      type:'line',
      data:{labels,datasets},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,position:'bottom',labels:{font:{size:10},boxWidth:12,padding:10}}},
        scales:{
          x:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#999',font:{size:10}}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#999',font:{size:10},callback:v=>`${v}cm`},
            suggestedMin:25,suggestedMax:110},
        }
      }
    });
    return ()=>measChartInstance.current?.destroy();
  },[sortedMeasHistory]);

  function logWeight() {
    const w = parseFloat(weightInput);
    if (!weightInput) { setWeightError('Please enter your weight'); return; }
    if (isNaN(w) || w < 30 || w > 200) { setWeightError('Weight must be between 30 and 200 kg'); return; }
    setWeightError('');
    setWeights(prev=>[...prev.filter(e=>e.date!==today), {date:today, weight:w}]);
    setWeightInput('');
    setWeightSaved(true);
    setTimeout(()=>setWeightSaved(false), 2000);
  }

  function logPhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW = 800;
        const scale = Math.min(1, maxW/img.width);
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg',0.75);
        setPhotos(prev=>[...prev,{date:today,dataUrl,note:photoNote}]);
        setPhotoNote('');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  const streak = calcStreak(workoutDone, daily);
  const unlockedAch = ACHIEVEMENTS.filter(a=>a.check(workoutDone,weights,streak,daily));

  const measFields = [
    {key:'chest',label:'Chest (cm)'},
    {key:'waist',label:'Waist (cm)'},
    {key:'arm',label:'Arm (cm)'},
    {key:'thigh',label:'Thigh (cm)'},
  ];

  function saveMeasurements() {
    for (const f of measFields) {
      const val = measEdit[f.key];
      if (val !== undefined && val !== '') {
        const n = parseFloat(val);
        if (isNaN(n) || n < 20 || n > 200) {
          setMeasError(`${f.label.split(' ')[0]} must be between 20 and 200 cm`);
          return;
        }
      }
    }
    setMeasError('');
    const entry = {...measEdit, date: today};
    measFields.forEach(f=>{ if(entry[f.key]) entry[f.key]=parseFloat(entry[f.key]); });
    setMeasHistory(prev=>[...prev.filter(e=>e.date!==today), entry]);
    setMeasurements({...measEdit,updatedAt:today});
    setMeasEdit({});
    setExpandMeas(false);
  }

  return (
    <div className="content">
      {/* WEIGHT LOG */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:12}}>
          ⚖️ Log Weight
        </div>
        <div style={{display:'flex',gap:10}}>
          <input type="number" inputMode="decimal" placeholder="e.g. 86.2 kg" value={weightInput}
            onChange={e=>{setWeightInput(e.target.value);setWeightError('');}}
            style={{flex:1,borderColor:weightError?'#EF4444':undefined}}
            min="30" max="200" step="0.1"/>
          <button className="btn btn-primary" style={{flexShrink:0}} onClick={logWeight}>Log</button>
        </div>
        {weightError && <div style={{fontSize:12,color:'#EF4444',marginTop:6,fontWeight:600}}>{weightError}</div>}
        {weightSaved && <div style={{fontSize:12,color:'var(--accent)',marginTop:6,fontWeight:700}}>✓ Weight saved!</div>}
      </div>

      {/* CHART + PREDICTOR */}
      {sortedWeights.length>0 && (
        <div className="card">
          <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:10}}>Weight Progress</div>
          <div className="chart-wrap"><canvas ref={chartRef}/></div>
          <div style={{display:'flex',gap:14,marginTop:8}}>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}>
              <div style={{width:16,height:2,background:'#00A86B',borderRadius:1}}/> Actual
            </div>
            <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}}>
              <div style={{width:16,height:2,background:'#F59E0B',borderRadius:1,borderTop:'1px dashed #F59E0B'}}/> Target 75kg
            </div>
          </div>
          {prediction && (
            <div className="predictor" style={{marginTop:14}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--accent-dk)',letterSpacing:'.08em',textTransform:'uppercase',marginBottom:4}}>Progress Predictor</div>
              <div style={{fontSize:15,fontWeight:700,color:'var(--text)'}}>At current pace, you'll reach 75 kg by</div>
              <div style={{fontSize:20,fontWeight:800,color:'var(--accent)',marginTop:4}}>{prediction}</div>
            </div>
          )}
        </div>
      )}

      {/* RECENT WEIGHTS */}
      {sortedWeights.length>0 && (
        <div className="card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>Weight Log</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>tap most recent to edit</div>
          </div>
          {(()=>{
            const all=[...sortedWeights].reverse();
            const visible=showAllWeights?all:all.slice(0,5);
            return (
              <>
                <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,WebkitOverflowScrolling:'touch'}}>
                  {visible.map((w,i,arr)=>{
                    const prev=arr[i+1];
                    const delta=prev?+(w.weight-prev.weight).toFixed(1):null;
                    const isLatest=i===0;
                    return (
                      <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,flexShrink:0,minWidth:54,paddingTop:6,paddingRight:6}}>
                        <div style={{
                          width:48,height:48,borderRadius:'50%',
                          background:isLatest?'var(--accent)':'var(--accent-lt)',
                          display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                          position:'relative',cursor:isLatest?'pointer':'default',
                          boxShadow:isLatest?'0 2px 10px rgba(0,168,107,.35)':'none',
                        }} onClick={isLatest?()=>{setWeightInput(String(w.weight));setTimeout(()=>document.querySelector('input[placeholder*="86.2"]')?.focus(),100);}:undefined}>
                          <span style={{fontSize:13,fontWeight:900,color:isLatest?'#fff':'var(--accent-dk)',lineHeight:1}}>{w.weight}</span>
                          <span style={{fontSize:8,color:isLatest?'rgba(255,255,255,.8)':'var(--muted)',fontWeight:600}}>kg</span>
                          {isLatest && (
                            <button onClick={e=>{e.stopPropagation();setWeights(p=>p.filter(e2=>e2.date!==w.date));}}
                              style={{position:'absolute',top:-3,right:-3,width:16,height:16,borderRadius:'50%',
                                background:'#EF4444',border:'none',color:'#fff',fontSize:10,cursor:'pointer',
                                display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>×</button>
                          )}
                        </div>
                        <div style={{fontSize:9,color:'var(--muted)',fontWeight:600,textAlign:'center',lineHeight:1.2}}>
                          {new Date(w.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
                        </div>
                        {delta!==null && delta!==0 && (
                          <div style={{fontSize:9,fontWeight:700,color:delta<0?'var(--accent)':'#EF4444'}}>
                            {delta<0?'↓':'↑'}{Math.abs(delta)}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                {all.length>5 && (
                  <button onClick={()=>setShowAllWeights(v=>!v)}
                    style={{marginTop:10,background:'none',border:'none',color:'var(--accent)',fontSize:12,
                      fontWeight:700,fontFamily:'inherit',cursor:'pointer',padding:0}}>
                    {showAllWeights?'Show less ▲':`View all ${all.length} entries ▼`}
                  </button>
                )}
              </>
            );
          })()}
        </div>
      )}

      {/* MEASUREMENTS */}
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:12,borderBottom:'1px solid var(--border)',marginBottom:4}}>
          <span style={{fontSize:13,fontWeight:800,color:'var(--text)'}}>📏 Body Measurements</span>
          {measurements.updatedAt && (
            <span onClick={()=>{if(window.confirm('Clear all measurements?')){setMeasurements({});setMeasHistory([]);setMeasEdit({});}}}
              style={{fontSize:11,color:'#EF4444',fontWeight:700,padding:'2px 8px',borderRadius:6,
                background:'#FEF2F2',cursor:'pointer'}}>Reset</span>
          )}
        </div>
        {(
          <>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:8,marginBottom:10}}>
              {measurements.updatedAt ? `Last saved: ${measurements.updatedAt} — update any field and save` : 'Enter your measurements to start tracking'}
            </div>
            <div className="meas-grid">
              {measFields.map(f=>(
                <div key={f.key} className="meas-field">
                  <label style={{display:'flex',justifyContent:'space-between'}}>
                    <span>{f.label}</span>
                    {sortedMeasHistory.length>=2 && sortedMeasHistory[0][f.key] && measurements[f.key] && (()=>{
                      const delta = parseFloat(measurements[f.key]) - sortedMeasHistory[0][f.key];
                      return delta!==0 ? (
                        <span style={{fontSize:10,fontWeight:700,color:delta<0?'var(--accent)':'#EF4444'}}>
                          {delta<0?'↓':'↑'}{Math.abs(delta).toFixed(1)} cm
                        </span>
                      ) : null;
                    })()}
                  </label>
                  <input type="number" inputMode="decimal"
                    placeholder={f.label.includes('Chest')?'e.g. 95':f.label.includes('Waist')?'e.g. 88':f.label.includes('Arm')?'e.g. 35':'e.g. 58'}
                    value={measEdit[f.key]!=null&&measEdit[f.key]!==''?measEdit[f.key]:''}
                    onChange={e=>{setMeasEdit(p=>({...p,[f.key]:e.target.value}));setMeasError('');}}/>
                </div>
              ))}
            </div>
            {measError && <div style={{fontSize:12,color:'#EF4444',marginTop:8,fontWeight:600}}>{measError}</div>}
            <button className="btn btn-primary btn-block" style={{marginTop:14}} onClick={saveMeasurements}>
              Save This Week's Measurements
            </button>

            {/* WEEKLY HISTORY */}
            {sortedMeasHistory.length>0 && (
              <div style={{marginTop:16}}>
                <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>Weekly Log</div>
                {[...sortedMeasHistory].reverse().map((entry,i,arr)=>{
                  const wkNum = startDate ? Math.max(1,Math.floor((new Date(entry.date)-new Date(startDate))/(864e5*7))+1) : null;
                  const prevEntry = arr[i+1];
                  return (
                    <div key={i} style={{padding:'10px 0',borderBottom:'1px solid var(--border)',display:'flex',gap:10,alignItems:'flex-start'}}>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <span style={{fontSize:12,fontWeight:700,color:'var(--text)'}}>
                            {new Date(entry.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
                          </span>
                          {wkNum && <span style={{fontSize:10,background:'var(--accent-lt)',color:'var(--accent-dk)',fontWeight:700,padding:'1px 6px',borderRadius:5}}>Wk {wkNum}</span>}
                        </div>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                          {measFields.filter(f=>entry[f.key]!=null).map(f=>{
                            const delta = prevEntry && prevEntry[f.key]!=null ? (entry[f.key]-prevEntry[f.key]).toFixed(1) : null;
                            return (
                              <div key={f.key} style={{fontSize:11,color:'var(--text2)'}}>
                                <span style={{fontWeight:700}}>{f.label.split(' ')[0]}:</span> {entry[f.key]}cm
                                {delta && delta!=='0.0' && (
                                  <span style={{marginLeft:3,fontWeight:700,color:parseFloat(delta)<0?'var(--accent)':'#EF4444'}}>
                                    {parseFloat(delta)<0?'↓':'↑'}{Math.abs(parseFloat(delta))}
                                  </span>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      <button onClick={()=>setMeasHistory(prev=>prev.filter(e=>e!==entry))}
                        style={{background:'none',border:'1px solid var(--border)',borderRadius:8,width:28,height:28,cursor:'pointer',color:'var(--muted)',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,lineHeight:1}}>
                        ×
                      </button>
                    </div>
                  );
                })}
              </div>
            )}

            {/* TREND CHART */}
            {sortedMeasHistory.length>=2 && (
              <div style={{marginTop:16}}>
                <div style={{fontSize:11,fontWeight:800,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:8}}>Trend Chart</div>
                <div className="chart-wrap"><canvas ref={measChartRef}/></div>
              </div>
            )}
          </>
        )}
      </div>

      {/* PHOTOS */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:12}}>Progress Photos</div>
        <div className="photo-grid">
          <label className="photo-add">
            <span style={{fontSize:24}}>📸</span>
            <span>Add Photo</span>
            <input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={logPhoto}/>
          </label>
          {[...photos].reverse().slice(0,8).map((p,i)=>(
            <div key={i} className="photo-cell" onClick={()=>setViewPhoto(p)}>
              <img src={p.dataUrl} alt="progress"/>
              <div className="photo-lbl">{new Date(p.date).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
              <button onClick={e=>{e.stopPropagation();setPhotos(prev=>prev.filter(x=>x!==p));}}
                style={{position:'absolute',top:4,right:4,width:22,height:22,borderRadius:'50%',background:'rgba(0,0,0,.55)',border:'none',color:'#fff',fontSize:14,lineHeight:'22px',textAlign:'center',cursor:'pointer',padding:0}}>×</button>
            </div>
          ))}
        </div>
      </div>

      {viewPhoto && (
        <div className="modal-overlay" onClick={()=>setViewPhoto(null)}>
          <div className="modal-body" onClick={e=>e.stopPropagation()}>
            <img src={viewPhoto.dataUrl} className="modal-img" alt="progress"/>
            <div style={{marginTop:10,fontSize:13,color:'var(--muted)',textAlign:'center'}}>
              {new Date(viewPhoto.date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
            </div>
            {viewPhoto.note && <div style={{marginTop:6,fontSize:13,color:'var(--text2)',textAlign:'center'}}>{viewPhoto.note}</div>}
            <div style={{display:'flex',gap:10,marginTop:12}}>
              <button className="btn btn-outline btn-block" onClick={()=>setViewPhoto(null)}>Close</button>
              <button className="btn btn-block" style={{background:'#EF4444',color:'#fff'}}
                onClick={()=>{setPhotos(prev=>prev.filter(x=>x!==viewPhoto));setViewPhoto(null);}}>Delete</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MANAGE TAB ─────────────────────────────────────────────────────────────
function PlanTab({startDate, setStartDate, workoutDone, daily, weights}) {
  const wk = weeksElapsed(startDate);
  const [importMsg, setImportMsg] = useState('');
  const [showCal, setShowCal] = useState(false);
  const importRef = useRef(null);

  const LS_KEYS = ['pf_start','pf_weights','pf_photos','pf_exercise_logs','pf_daily','pf_workout_done','pf_habits','pf_measurements','pf_meas_history'];

  function exportData() {
    const data = {_exported: new Date().toISOString()};
    LS_KEYS.forEach(k => { const v = localStorage.getItem(k); if(v !== null) data[k] = JSON.parse(v); });
    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `piyush-transformation-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        LS_KEYS.forEach(k => { if(data[k] !== undefined) localStorage.setItem(k, JSON.stringify(data[k])); });
        setImportMsg('✓ Data restored! Reloading...');
        setTimeout(() => window.location.reload(), 1500);
      } catch {
        setImportMsg('✗ Invalid file. Use a valid export backup.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }
  return (
    <div className="content">
      {/* PROGRAMME */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:14}}>Programme</div>
        {startDate ? (
          <>
            <div style={{background:'var(--bg)',borderRadius:12,padding:'12px 14px',marginBottom:14}}>
              <div style={{fontSize:11,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}}>Start Date</div>
              <div style={{fontSize:16,fontWeight:800,color:'var(--text)'}}>
                {new Date(startDate).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
              </div>
              <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Week {wk} of 20 · {getPhase(wk).name}</div>
            </div>
            <button className="btn btn-block" style={{background:'#FEF2F2',color:'#DC2626',border:'1.5px solid #FECACA',fontWeight:700,fontFamily:'inherit',cursor:'pointer',borderRadius:12,padding:'12px',fontSize:13}}
              onClick={()=>{if(window.confirm('Reset start date? Your workout and weight data will not be erased.')) setStartDate(null);}}>
              Reset Start Date
            </button>
          </>
        ) : (
          <div style={{textAlign:'center',padding:'8px 0'}}>
            <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Set your programme start date to begin tracking.</div>
            <button className="btn btn-primary btn-block" onClick={()=>setShowCal(true)}>Set Start Date</button>
          </div>
        )}
      </div>

      {/* DATA */}
      <div className="card">
        <div style={{fontSize:13,fontWeight:800,color:'var(--text)',marginBottom:4}}>Data Backup</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Export your data as a JSON file, or restore from a previous backup. Your data stays on this device.</div>
        <div style={{display:'flex',gap:10}}>
          <button onClick={exportData} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            background:'var(--accent-lt)',color:'var(--accent-dk)',border:'1.5px solid var(--accent)',borderRadius:12,
            padding:'12px',fontSize:13,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Backup
          </button>
          <button onClick={()=>importRef.current.click()} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:8,
            background:'var(--bg)',color:'var(--text)',border:'1.5px solid var(--border)',borderRadius:12,
            padding:'12px',fontSize:13,fontWeight:700,fontFamily:'inherit',cursor:'pointer'}}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Restore
          </button>
          <input ref={importRef} type="file" accept=".json,application/json" style={{display:'none'}} onChange={importData}/>
        </div>
        {importMsg && (
          <div style={{fontSize:12,fontWeight:700,color:importMsg.startsWith('✓')?'var(--accent)':'#EF4444',marginTop:10,textAlign:'center'}}>
            {importMsg}
          </div>
        )}
      </div>

      {showCal && <CalendarPicker onConfirm={d=>{setStartDate(d);setShowCal(false);}} onClose={()=>setShowCal(false)}/>}
    </div>
  );
}

// ── QUICK LOG MODALS ───────────────────────────────────────────────────────
function QuickLogWeight({onClose, onSave}) {
  const [val, setVal] = useState('');
  return (
    <QuickModal title="Log Weight" onClose={onClose}>
      <input type="number" inputMode="decimal" placeholder="Weight in kg (e.g. 85.5)" value={val}
        onChange={e=>setVal(e.target.value)} style={{width:'100%',marginBottom:12}}/>
      <button className="btn btn-primary btn-block" onClick={()=>{const w=parseFloat(val);if(w)onSave(w);}}>
        Save Weight
      </button>
    </QuickModal>
  );
}

function QuickLogProtein({onClose, onSave}) {
  const [val, setVal] = useState('');
  return (
    <QuickModal title="Log Protein" onClose={onClose}>
      <input type="number" inputMode="numeric" placeholder="Protein in grams" value={val}
        onChange={e=>setVal(e.target.value)} style={{width:'100%',marginBottom:12}}/>
      <button className="btn btn-primary btn-block" onClick={()=>{const p=parseInt(val);if(p)onSave(p);}}>
        Save
      </button>
    </QuickModal>
  );
}

// ── WARMUP / COOLDOWN ICONS ────────────────────────────────────────────────
function WuIcon({name}) {
  const p = {width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:'var(--accent)',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'};
  // Warmup
  if(name==='Light Cardio')       return <svg {...p}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
  if(name==='Arm Circles')        return <svg {...p}><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.08"/></svg>;
  if(name==='Leg Swings')         return <svg {...p}><line x1="12" y1="2" x2="12" y2="22"/><polyline points="17 7 12 2 7 7"/><polyline points="17 17 12 22 7 17"/></svg>;
  if(name==='Hip Circles')        return <svg {...p}><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-4.08"/></svg>;
  if(name==='Bodyweight Squats')  return <svg {...p}><circle cx="12" cy="4.5" r="2.2"/><path d="M9 8h6l.8 6H8.2z"/><path d="M9 14l-2 6m8-6l2 6"/></svg>;
  if(name==='Cat-Cow')            return <svg {...p}><path d="M3 12c3-5 6-5 9 0s6 5 9 0"/></svg>;
  // Cooldown
  if(name==='Quad Stretch')       return <svg {...p}><line x1="22" y1="5" x2="17" y2="5"/><polyline points="22 5 22 10"/><path d="M22 5a10 10 0 1 1-6.08 1.92"/></svg>;
  if(name==='Hamstring Stretch')  return <svg {...p}><path d="M5 19l7-14 7 14"/><line x1="8" y1="13" x2="16" y2="13"/></svg>;
  if(name==='Chest Opener')       return <svg {...p}><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>;
  if(name==="Child's Pose")       return <svg {...p}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;
  if(name==='Hip Flexor Stretch') return <svg {...p}><circle cx="12" cy="12" r="9"/><polyline points="12 8 12 12 15 14"/></svg>;
  if(name==='Deep Breathing')     return <svg {...p}><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>;
  return <svg {...p}><circle cx="12" cy="12" r="8"/></svg>;
}

// ── NAV ICONS ──────────────────────────────────────────────────────────────
function NavIcon({name, active}) {
  const c = active ? 'var(--accent)' : 'var(--muted2)';
  const sw = active ? 2.2 : 1.8;
  const props = {width:22,height:22,viewBox:'0 0 24 24',fill:'none',stroke:c,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'};
  if(name==='home') return <svg {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>;
  if(name==='train') return <svg {...props}><circle cx="6" cy="12" r="2.5"/><circle cx="18" cy="12" r="2.5"/><line x1="8.5" y1="12" x2="15.5" y2="12"/><line x1="3.5" y1="10" x2="3.5" y2="14"/><line x1="20.5" y1="10" x2="20.5" y2="14"/></svg>;
  if(name==='fuel') return <svg {...props}><path d="M3 2v7c0 2.2 1.8 4 4 4h1v9h2V2H3z"/><path d="M16 2v4l2 2-2 2v4c0 1.1.9 2 2 2h1V2h-3z"/></svg>;
  if(name==='progress') return <svg {...props}><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>;
  if(name==='plan') return <svg {...props}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="12" y2="15"/></svg>;
  return null;
}

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('home');
  const [startDate, setStartDate] = useLS('pf_start', null);
  const [weights, setWeights] = useLS('pf_weights', []);
  const [photos, setPhotos] = useLS('pf_photos', []);
  const [exLogs, setExLogs] = useLS('pf_exercise_logs', {});
  const [daily, setDaily] = useLS('pf_daily', {});
  const [workoutDone, setWorkoutDone] = useLS('pf_workout_done', {});
  const [habits, setHabits] = useLS('pf_habits', {});
  const [measurements, setMeasurements] = useLS('pf_measurements', {});

  // FAB quick-log state
  const [quickModal, setQuickModal] = useState(null);
  const today = todayStr();

  const navItems = [
    {key:'home', label:'Home'},
    {key:'train', label:'Train'},
    {key:'fuel', label:'Fuel'},
    {key:'progress', label:'Progress'},
    {key:'plan', label:'Manage'},
  ];

  function logWaterGlass() {
    setDaily(prev=>{
      const td = prev[today]||{};
      return {...prev,[today]:{...td,water:Math.min(20,(td.water||0)+1)}};
    });
  }

  function logProtein(g) {
    setDaily(prev=>{
      const td = prev[today]||{};
      return {...prev,[today]:{...td,protein:(td.protein||0)+g}};
    });
    setQuickModal(null);
  }

  function logWeight(w) {
    setWeights(prev=>[...prev.filter(e=>e.date!==today),{date:today,weight:w}]);
    setQuickModal(null);
  }

  function startWorkout() {
    setTab('train');
  }

  return (
    <div className="app">
      {tab==='home' && (
        <HomeTab startDate={startDate} setStartDate={setStartDate}
          weights={weights} workoutDone={workoutDone} daily={daily} setDaily={setDaily}
          exLogs={exLogs} onStartWorkout={startWorkout} measurements={measurements}/>
      )}
      {tab==='train' && (
        <TrainTab startDate={startDate} workoutDone={workoutDone} setWorkoutDone={setWorkoutDone}
          daily={daily} setDaily={setDaily} exLogs={exLogs} setExLogs={setExLogs}/>
      )}
      {tab==='fuel' && (
        <FuelTab daily={daily} setDaily={setDaily} startDate={startDate}/>
      )}
      {tab==='progress' && (
        <ProgressTab weights={weights} setWeights={setWeights} daily={daily} setDaily={setDaily}
          photos={photos} setPhotos={setPhotos} measurements={measurements} setMeasurements={setMeasurements}
          workoutDone={workoutDone} startDate={startDate}/>
      )}
      {tab==='plan' && (
        <PlanTab startDate={startDate} setStartDate={setStartDate} workoutDone={workoutDone} daily={daily} weights={weights}/>
      )}

      <nav className="bnav">
        {navItems.map(n=>(
          <button key={n.key} className={`bnav-btn ${tab===n.key?'active':''}`} onClick={()=>setTab(n.key)}>
            <NavIcon name={n.key} active={tab===n.key}/>
            <span className="bnav-label">{n.label}</span>
          </button>
        ))}
      </nav>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
